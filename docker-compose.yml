services:
  # OpenClaw Voice Orchestrator (main service)
  openclaw-voice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-voice
    user: "1000:1000"
    
    depends_on:
      - whisper
      - piper
    
    env_file:
      - .env
    
    environment:
      # Provider selection (openclaw|zeroclaw|tinyclaw|ironclaw|mimiclaw|picoclaw|nanobot)
      VOICE_CLAW_PROVIDER: ${VOICE_CLAW_PROVIDER:-openclaw}
      VOICE_SESSION_PREFIX: ${VOICE_SESSION_PREFIX:-voice}
      VOICE_GATEWAY_TIMEOUT: ${VOICE_GATEWAY_TIMEOUT:-30000}
      
      # OpenClaw provider configuration
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-assistant}
      
      # TinyClaw provider configuration
      TINYCLAW_HOME: ${TINYCLAW_HOME:-/home/node/.tinyclaw}
      TINYCLAW_AGENT_ID: ${TINYCLAW_AGENT_ID:-default}
      
      # ZeroClaw provider configuration
      ZEROCLAW_GATEWAY_URL: ${ZEROCLAW_GATEWAY_URL}
      ZEROCLAW_WEBHOOK_TOKEN: ${ZEROCLAW_WEBHOOK_TOKEN}
      ZEROCLAW_WEBHOOK_CHANNEL: ${ZEROCLAW_WEBHOOK_CHANNEL:-voice}
      
      # IronClaw provider configuration
      IRONCLAW_GATEWAY_URL: ${IRONCLAW_GATEWAY_URL}
      IRONCLAW_GATEWAY_TOKEN: ${IRONCLAW_GATEWAY_TOKEN}
      IRONCLAW_USE_WEBSOCKET: ${IRONCLAW_USE_WEBSOCKET:-true}
      IRONCLAW_AGENT_ID: ${IRONCLAW_AGENT_ID:-default}
      
      # MimiClaw provider configuration
      MIMICLAW_DEVICE_HOST: ${MIMICLAW_DEVICE_HOST}
      MIMICLAW_DEVICE_PORT: ${MIMICLAW_DEVICE_PORT:-18789}
      MIMICLAW_USE_WEBSOCKET: ${MIMICLAW_USE_WEBSOCKET:-true}
      MIMICLAW_TELEGRAM_BOT_TOKEN: ${MIMICLAW_TELEGRAM_BOT_TOKEN}
      MIMICLAW_TELEGRAM_CHAT_ID: ${MIMICLAW_TELEGRAM_CHAT_ID}
      
      # PicoClaw provider configuration (early-stage framework)
      PICOCLAW_HOME: ${PICOCLAW_HOME:-/home/node/.picoclaw/workspace}
      PICOCLAW_GATEWAY_URL: ${PICOCLAW_GATEWAY_URL}
      PICOCLAW_AGENT_ID: ${PICOCLAW_AGENT_ID:-default}
      
      # NanoBot provider configuration (ultra-lightweight Python agent)
      NANOBOT_HOME: ${NANOBOT_HOME:-/home/node/.nanobot}
      NANOBOT_GATEWAY_URL: ${NANOBOT_GATEWAY_URL:-http://localhost:18790}
      NANOBOT_AGENT_ID: ${NANOBOT_AGENT_ID}
      
      # Legacy gateway configuration (backward compatibility)
      GATEWAY_URL: ${GATEWAY_URL:-http://openclaw-gateway:18789}
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN}
      GATEWAY_AGENT_ID: assistant
      GATEWAY_SESSION_PREFIX: "voice:"
      
      # STT configuration
      WHISPER_URL: http://whisper:8080
      WHISPER_LANGUAGE: en
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      
      # TTS configuration
      PIPER_URL: http://piper:5000
      PIPER_VOICE_ID: en_US-amy-medium

      # Audio playback mode (auto|pulse|alsa)
      AUDIO_PLAYBACK: ${AUDIO_PLAYBACK:-auto}
      
      # Audio capture device (Linux: PulseAudio/ALSA device name)
      AUDIO_CAPTURE_DEVICE: ${AUDIO_CAPTURE_DEVICE:-${AUDIO_DEVICE:-default}}
      
      # Audio playback device (Linux ALSA only - used when AUDIO_PLAYBACK=alsa)
      AUDIO_PLAYBACK_DEVICE: ${AUDIO_PLAYBACK_DEVICE:-${AUDIO_DEVICE:-default}}
      
      AUDIO_SAMPLE_RATE: ${AUDIO_SAMPLE_RATE:-16000}
      PULSE_SERVER: unix:/run/user/1000/pulse/native
      PULSE_COOKIE: /home/node/.pulse-host/cookie
      XDG_RUNTIME_DIR: /run/user/1000
      HOME: /home/node

      # VAD tuning
      VAD_SILENCE_THRESHOLD: ${VAD_SILENCE_THRESHOLD}
      VAD_NOISE_FLOOR_THRESHOLD: ${VAD_NOISE_FLOOR_THRESHOLD}
      VAD_MIN_SPEECH_MS: ${VAD_MIN_SPEECH_MS}
      VAD_MIN_SILENCE_MS: ${VAD_MIN_SILENCE_MS}
      VAD_DEBUG: ${VAD_DEBUG}
      VAD_ABSOLUTE_RMS: ${VAD_ABSOLUTE_RMS}
      VAD_ABSOLUTE_SILENCE_RMS: ${VAD_ABSOLUTE_SILENCE_RMS}
      CUTIN_ABSOLUTE_RMS: ${CUTIN_ABSOLUTE_RMS}
      CUTIN_MIN_SPEECH_MS: ${CUTIN_MIN_SPEECH_MS}

      # Listening window
      MAX_LISTEN_MS: ${MAX_LISTEN_MS}
      PRE_ROLL_MS: ${PRE_ROLL_MS}
      
      # Wake word timeout system (optional)
      WAKE_WORD: ${WAKE_WORD}
      WAKE_WORD_TIMEOUT: ${WAKE_WORD_TIMEOUT}
      WAKE_WORD_ENGINE: ${WAKE_WORD_ENGINE:-whisper}
      SLEEP_PHRASE: ${SLEEP_PHRASE}

      # OpenWakeWord configuration (when WAKE_WORD_ENGINE=openwakeword)
      OPENWAKEWORD_URL: ${OPENWAKEWORD_URL:-http://openwakeword:8082}
      OPENWAKEWORD_CONFIDENCE_THRESHOLD: ${OPENWAKEWORD_CONFIDENCE_THRESHOLD:-0.5}
      OPENWAKEWORD_ENABLE_DEBUG: ${OPENWAKEWORD_ENABLE_DEBUG:-false}

      # Voice control HTTP server
      VOICE_HTTP_PORT: ${VOICE_HTTP_PORT}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    
    # Mount PulseAudio for audio capture/playback
    volumes:
      # Source code (read-only for production, but mounted for development)
      - ./src:/app/src:rw
      # Note: dist is NOT mounted - it's built into the image
      # This prevents the volume from wiping out the compiled code
      # PulseAudio socket and runtime directory (Linux)
      - /run/user/1000:/run/user/1000
      # PulseAudio auth cookie (mount parent directory to preserve symlinks)
      - /home/stever/.config/pulse:/home/node/.pulse-host:ro
      # ALSA config (fallback)
      - /etc/alsa:/etc/alsa:ro
      # Optional test audio input files
      - ./test-data:/test-data:ro
      # TinyClaw queue directory (for file-based messaging)
      - ${HOME}/.tinyclaw:/home/node/.tinyclaw
      # PicoClaw workspace (for file-based messaging)
      - ${HOME}/.picoclaw:/home/node/.picoclaw
      # NanoBot workspace (for file-based messaging)
      - ${HOME}/.nanobot:/home/node/.nanobot
    
    # Audio device access
    devices:
      - /dev/snd:/dev/snd
    
    group_add:
      - audio
    
    restart: unless-stopped
    ports:
      - "${VOICE_HTTP_PORT:-18910}:${VOICE_HTTP_PORT:-18910}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch(process.env.OPENCLAW_GATEWAY_URL||process.env.GATEWAY_URL||'http://openclaw-gateway:18789').then(()=>process.exit(0)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  # Whisper STT service (faster-whisper)
  whisper:
    restart: unless-stopped
    build:
      context: ./docker/whisper
      dockerfile: Dockerfile
    ports:
      - "8086:8080"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - HSA_ENABLE_SDMA=0
      - AMD_SERIALIZE_KERNEL=3
    volumes:
      - ./whisper-models:/models

  # Piper TTS HTTP service
  piper:
    restart: unless-stopped
    build:
      context: ./docker/piper1-gpl
      dockerfile: Dockerfile
    command: ["server", "--model", "en_US-amy-medium"]
    ports:
      - "5002:5000"
    volumes:
      - ./docker/piper-models:/home/piper/.local/share/piper
      - ./docker/piper-data:/data

  # OpenWakeWord Service (optional - for fast wake word detection)
  openwakeword:
    restart: unless-stopped
    build:
      context: ./docker/openwakeword-wrapper
      dockerfile: Dockerfile
    container_name: openclaw-openwakeword
    ports:
      - "8082:8082"
    environment:
      OPENWAKEWORD_MODELS: /models
      DETECTION_THRESHOLD: ${OPENWAKEWORD_CONFIDENCE_THRESHOLD:-0.5}
      PYTHONUNBUFFERED: "1"
    volumes:
      - openwakeword-models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: openclaw_default
    external: true

volumes:
  openwakeword-models:
